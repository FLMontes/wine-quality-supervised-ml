name: Python check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check training script imports
        run: |
          python -m py_compile src/data_loader.py src/train_supervised.py
